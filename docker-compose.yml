services:
  jibsa:
    build: .
    env_file: .env
    volumes:
      # User configuration (read-only)
      - ./config:/app/config:ro
      # Google OAuth token (Calendar + Gmail — Phase 3/4)
      - ./data/google-token:/app/tokens
      # APScheduler SQLite persistence (Phase 3)
      - ./data/scheduler:/app/scheduler-db
    restart: unless-stopped
